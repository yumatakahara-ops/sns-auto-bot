name: Auto Post to X and Threads

# 注: GitHub純正の schedule(cron) は数時間単位で実行がズレることがあるため、
# ここでは使わない。代わりに外部サービス(cron-job.org等)から、正確な時刻に
# workflow_dispatch(手動実行と同じ仕組み)を叩いてもらう方式にしている。
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true にするとAPIに実際は投稿せず内容だけ確認できます"
        required: false
        default: "false"
      time_slot:
        description: "どの時間帯として動かすか"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - noon
          - evening

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run posting script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          POST_TIME_SLOT: ${{ github.event.inputs.time_slot || 'morning' }}
        run: python main.py

      - name: Commit updated history file
        run: |
          git config user.name "auto-post-bot"
          git config user.email "actions@github.com"
          git add posted_history.json
          git diff --staged --quiet || git commit -m "Update posted history [skip ci]"
          git push
